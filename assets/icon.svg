<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1135"/>
      <stop offset="50%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#1a1135"/>
    </linearGradient>
    <linearGradient id="link" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c6df5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7c6df5;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7c6df5" flood-opacity="0.4"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  
  <!-- Subtle border -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#7c6df5" stroke-width="2" stroke-opacity="0.3"/>
  
  <!-- Glow effect behind links -->
  <ellipse cx="256" cy="256" rx="140" ry="140" fill="url(#glow)" opacity="0.3"/>
  
  <!-- Link chain - two interlocking links -->
  <g filter="url(#shadow)" transform="translate(256,256)">
    <!-- Link 1 (upper-left) -->
    <g transform="rotate(-45)">
      <rect x="-100" y="-28" width="130" height="56" rx="28" fill="none" stroke="url(#link)" stroke-width="8"/>
    </g>
    <!-- Link 2 (lower-right) -->
    <g transform="rotate(-45)">
      <rect x="-30" y="-28" width="130" height="56" rx="28" fill="none" stroke="url(#link)" stroke-width="8"/>
    </g>
  </g>
  
  <!-- Small sparkle accents -->
  <circle cx="160" cy="140" r="3" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="370" cy="360" r="2.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="140" cy="340" r="2" fill="#c4b5fd" opacity="0.4"/>
  <circle cx="380" cy="160" r="2" fill="#a78bfa" opacity="0.6"/>
</svg>
